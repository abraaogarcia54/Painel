<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Painel de Design - Figma</title>
<link rel="icon" type="image/svg+xml" href="https://infinitsolucoeswebdevelopment.com/images/infinit-blue-svg.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f0f;
    --bg2:      #161616;
    --bg3:      #1e1e1e;
    --border:   #2a2a2a;
    --border2:  #333;
    --text:     #e8e8e2;
    --muted:    #666;
    --muted2:   #444;
    --done:     #1D9E75;
    --done-bg:  #0a2e22;
    --done-txt: #5fcca0;
    --rev:      #d4860f;
    --rev-bg:   #2e1f05;
    --rev-txt:  #f5b44a;
    --todo:     #c0392b;
    --todo-bg:  #2e0e0a;
    --todo-txt: #f07060;
    --nd:       #555;
    --nd-bg:    #1a1a1a;
    --nd-txt:   #888;
    --accent:   #e8e8e2;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 32px 24px 64px;
  }

  header {
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header p {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 4px;
  }

  .global-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .global-bar .pct {
    font-size: 22px;
    font-weight: 500;
    color: var(--done);
    line-height: 1;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
    margin-bottom: 24px;
  }

  .stat {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }

  .stat:hover, .stat.active { border-color: var(--border2); background: var(--bg3); }

  .stat.active[data-f="done"]  { border-color: var(--done); }
  .stat.active[data-f="rev"]   { border-color: var(--rev); }
  .stat.active[data-f="todo"]  { border-color: var(--todo); }
  .stat.active[data-f="nd"]    { border-color: var(--nd); }

  .stat-n {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-n.c-done { color: var(--done); }
  .stat-n.c-rev  { color: var(--rev); }
  .stat-n.c-todo { color: var(--todo); }
  .stat-n.c-nd   { color: var(--nd); }
  .stat-n.c-pct  { color: var(--text); }

  .stat-l {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  /* ---- top bar (legend + actions) ---- */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
  }

  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .legend span { display: flex; align-items: center; gap: 5px; cursor: pointer; }
  .legend span:hover { color: var(--text); }

  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .d-done { background: var(--done); }
  .d-rev  { background: var(--rev); }
  .d-todo { background: var(--todo); }
  .d-nd   { background: var(--nd); }

  .actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .saved-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--done);
    opacity: 0;
    transition: opacity .3s;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .saved-tag.show { opacity: 1; }

  .btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 5px 11px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: .06em;
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--muted);
    transition: all .15s;
  }
  .btn:hover { background: var(--bg3); color: var(--text); }
  .btn-danger:hover { border-color: var(--todo); color: var(--todo-txt); background: var(--todo-bg); }

  /* ---- grid ---- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .card:hover { border-color: var(--border2); }

  .card-head {
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .card-name {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .03em;
    color: var(--text);
    text-transform: uppercase;
    cursor: pointer;
    flex: 1;
    min-width: 0;
  }
  .card-name:hover { color: var(--done-txt); }

  .card-name-input {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .03em;
    text-transform: uppercase;
    background: var(--bg3);
    border: 1px solid var(--done);
    border-radius: 3px;
    color: var(--text);
    padding: 2px 6px;
    outline: none;
    width: 100%;
    min-width: 0;
    flex: 1;
  }

  .card-head-right {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .card-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
  }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted2);
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
    opacity: 0;
    transition: opacity .1s, color .1s;
    display: flex;
    align-items: center;
  }
  .card:hover .icon-btn { opacity: 1; }
  .icon-btn:hover { color: var(--todo-txt); }

  .prog-track { height: 2px; background: var(--border); }
  .prog-fill  { height: 2px; transition: width .4s ease; }
  .prog-done  { background: var(--done); }
  .prog-rev   { background: var(--rev); }
  .prog-todo  { background: var(--todo); }
  .prog-nd    { background: var(--nd); }

  .card-body { padding: 6px 0 4px; }

  .item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 14px;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  .item:last-child { border-bottom: none; }
  .item:hover { background: var(--bg3); }

  .item-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted2);
    font-size: 13px;
    line-height: 1;
    padding: 0 2px;
    opacity: 0;
    transition: opacity .1s, color .1s;
    flex-shrink: 0;
  }
  .item:hover .item-del { opacity: 1; }
  .item-del:hover { color: var(--todo-txt); }

  .item-name {
    font-size: 12px;
    color: #aaa;
    flex: 1;
  }

  .badge {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .05em;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: filter .1s;
  }
  .badge:hover { filter: brightness(1.25); }

  .b-done { background: var(--done-bg); color: var(--done-txt); }
  .b-rev  { background: var(--rev-bg);  color: var(--rev-txt); }
  .b-todo { background: var(--todo-bg); color: var(--todo-txt); }
  .b-nd   { background: var(--nd-bg);   color: var(--nd-txt); }

  /* ---- add item form ---- */
  .add-item-row {
    display: flex;
    gap: 6px;
    padding: 7px 14px;
    border-top: 1px solid var(--border);
  }
  .add-item-row input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 4px 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    outline: none;
    min-width: 0;
  }
  .add-item-row input:focus { border-color: var(--done); }
  .add-item-row button {
    background: var(--done-bg);
    border: 1px solid var(--done);
    border-radius: 4px;
    color: var(--done-txt);
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 8px;
    cursor: pointer;
    white-space: nowrap;
  }
  .add-item-row button:hover { background: var(--done); color: #fff; }
  .add-item-row .cancel-btn {
    background: none;
    border-color: var(--border2);
    color: var(--muted);
  }
  .add-item-row .cancel-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }

  .add-item-link {
    display: block;
    padding: 7px 14px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted2);
    text-transform: uppercase;
    letter-spacing: .06em;
    cursor: pointer;
    border-top: 1px solid var(--border);
    transition: color .1s, background .1s;
    text-align: center;
  }
  .add-item-link:hover { color: var(--done-txt); background: var(--bg3); }

  /* ---- add module card ---- */
  .card-add-module {
    background: none;
    border: 1px dashed var(--border2);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    padding: 16px;
    gap: 10px;
  }
  .card-add-module:hover { border-color: var(--done); background: var(--done-bg); }
  .card-add-module span {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .card-add-module:hover span { color: var(--done-txt); }

  .add-module-row {
    display: flex;
    gap: 6px;
    width: 100%;
  }
  .add-module-row input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--done);
    border-radius: 4px;
    padding: 6px 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .03em;
    outline: none;
    min-width: 0;
  }
  .add-module-row button {
    background: var(--done-bg);
    border: 1px solid var(--done);
    border-radius: 4px;
    color: var(--done-txt);
    font-family: var(--mono);
    font-size: 10px;
    padding: 6px 10px;
    cursor: pointer;
  }
  .add-module-row button:hover { background: var(--done); color: #fff; }

  footer {
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted2);
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Painel de Design - Figma</h1>
    <p id="subtitle">carregando...</p>
  </div>
  <div class="global-bar">
    <div>
      <div class="pct" id="pct-global" style="font-size: 40px;">0%</div>
      <div style="font-size:10px;margin-top:2px">concluído</div>
    </div>
  </div>
</header>

<div class="stats" id="stats"></div>

<div class="top-bar">
  <div class="legend">
    <span onclick="setFilter('all')"><span class="dot" style="background:var(--muted)"></span>Todos</span>
    <span onclick="setFilter('done')"><span class="dot d-done"></span>Feito</span>
    <span onclick="setFilter('rev')"><span class="dot d-rev"></span>Revisar</span>
    <span onclick="setFilter('todo')"><span class="dot d-todo"></span>Falta fazer</span>
    <span onclick="setFilter('nd')"><span class="dot d-nd"></span>Não definido</span>
  </div>
  <div class="actions">
    <span class="saved-tag" id="saved">salvo ✓</span>
    <button class="btn" onclick="exportData()" title="Copia os dados como JSON">exportar</button>
    <button class="btn btn-danger" onclick="resetData()" title="Volta aos dados originais">resetar</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<footer id="footer"></footer>

<script>
const DEFAULT_MODULES = [
  {
    name: "Admin",
    items: [
      { n: "Painel admin", s: "todo" }
    ]
  },
  {
    name: "Cadastro — Produto",
    items: [
      { n: "Consultar",           s: "done" },
      { n: "Cadastrar",           s: "done" },
      { n: "Consultar preço",     s: "done" },
      { n: "Grade",               s: "done" },
      { n: "Grupo",               s: "done" },
      { n: "SubGrupo",            s: "done" },
      { n: "Fabricante",          s: "done" },
      { n: "Coleção",             s: "done" },
      { n: "Tipo de produto",     s: "done" },
      { n: "Marca",               s: "done" },
      { n: "Etiqueta",            s: "done" },
      { n: "Promoção",            s: "done" },
      { n: "Combo / Kit",         s: "done" },
      { n: "Padronizados",        s: "done" },
      { n: "Unidade de medida",   s: "done" }
    ]
  },
  {
    name: "Cadastro — Pessoa",
    items: [
      { n: "Consultar",  s: "done" },
      { n: "Cadastrar",  s: "done" },
      { n: "Grupo",      s: "todo" }
    ]
  },
  {
    name: "Cadastro - Fiscal",
    items: [
      { n: "CFOP",         s: "done" },
      { n: "CST ICMS",     s: "done" },
      { n: "Regra fiscal", s: "done" }
    ]
  },
  {
    name: "Cadastro - Financeiro",
    items: [
      { n: "Tipo de pagamento", s: "done" },
      { n: "Prazo pagamento",   s: "done" },
      { n: "Plano de contas",   s: "done" },
      { n: "Centro de custo",   s: "todo" },
      { n: "Conta bancária",    s: "done" },
      { n: "Bandeira",          s: "done" },
      { n: "Banco",             s: "done" },
      { n: "Caixa",             s: "todo" }
    ]
  },
  {
    name: "Cadastro - Setor/Estoque",
    items: [
      { n: "Consultar",  s: "todo" },
      { n: "Cadastrar",  s: "todo" }
    ]
  },
  {
    name: "Cadastro - Usuários",
    items: [
      { n: "Consultar",          s: "todo" },
      { n: "Cadastrar",          s: "todo" },
      { n: "Grupo / Permissões", s: "todo" }
    ]
  },
  {
    name: "Vendas - Vendas",
    items: [
      { n: "Consultar",  s: "done" },
      { n: "Cadastrar",  s: "done" }
    ]
  },
  {
    name: "Vendas - Condicional",
    items: [
      { n: "Consultar",  s: "done" },
      { n: "Cadastrar",  s: "rev" }
    ]
  },
  {
    name: "Vendas - PDV",
    items: [
      { n: "Consultar",         s: "done" },
      { n: "Entrar PDV",        s: "done" },
      { n: "Consulta de caixa", s: "todo" },
      { n: "Abrir caixa",       s: "done" },
      { n: "Fechar caixa",      s: "done" }
    ]
  },
  {
    name: "Vendas - Troca",
    items: [
      { n: "Consultar",  s: "done" },
      { n: "Cadastrar",  s: "rev" }
    ]
  },
  {
    name: "Vendas - Vale Presente",
    items: [
      { n: "Consultar",  s: "done" },
      { n: "Cadastrar",  s: "done" }
    ]
  },
  {
    name: "Compras",
    items: [
      { n: "Consultar",    s: "done" },
      { n: "Cadastrar",    s: "done" },
      { n: "Importar XML", s: "done" },
      { n: "Manifesto",    s: "done" }
    ]
  },
  {
    name: "Financeiro",
    items: [
      { n: "Contas a pagar",       s: "done" },
      { n: "Contas a receber",     s: "done" },
      { n: "Gestão financeira",    s: "todo" },
      { n: "Fluxo de caixa",       s: "todo" },
      { n: "Conciliação bancária", s: "rev"  },
      { n: "Histórico de caixa",   s: "todo" }
    ]
  },
  {
    name: "Estoque",
    items: [
      { n: "Balanço",                  s: "todo" },
      { n: "Acerto de estoque",        s: "todo" },
      { n: "Transferência de estoque", s: "todo" }
    ]
  },
  {
    name: "Fiscal",
    items: [
      { n: "Gerar Sintegra",       s: "todo" },
      { n: "Gestão de documentos", s: "todo" }
    ]
  },
  {
    name: "Relatórios",
    items: [
      { n: "A definir", s: "nd" }
    ]
  },
  {
    name: "Integrações",
    items: [
      { n: "A definir", s: "nd" }
    ]
  },
  {
    name: "CRM",
    items: [
      { n: "A definir", s: "nd" }
    ]
  }
];

const STORAGE_KEY = 'painel-modules-v1';
const statusOrder = ['done', 'rev', 'todo', 'nd'];
const label = { done: "Feito", rev: "Revisar", todo: "Falta fazer", nd: "Não definido" };
const bcls  = { done: "b-done", rev: "b-rev", todo: "b-todo", nd: "b-nd" };

let modules = [];
let activeFilter   = "all";
let editingModule  = null; // index being renamed
let addingToModule = null; // index getting new item, or -1 for new module

/* ---- persistence ---- */
function loadModules() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (_) {}
  return JSON.parse(JSON.stringify(DEFAULT_MODULES));
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(modules));
  const el = document.getElementById('saved');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1800);
}

/* ---- helpers ---- */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function allItems() {
  return modules.flatMap(m => m.items);
}

/* ---- mutations ---- */
function cycleStatus(mi, ii) {
  const item = modules[mi].items[ii];
  item.s = statusOrder[(statusOrder.indexOf(item.s) + 1) % statusOrder.length];
  save();
  render();
}

function deleteItem(mi, ii) {
  modules[mi].items.splice(ii, 1);
  save();
  render();
}

function deleteModule(mi) {
  if (!confirm(`Remover o módulo "${modules[mi].name}"?`)) return;
  modules.splice(mi, 1);
  if (editingModule === mi) editingModule = null;
  save();
  render();
}

function startRename(mi) {
  editingModule = mi;
  renderGrid();
  setTimeout(() => {
    const el = document.getElementById(`rename-${mi}`);
    if (el) { el.focus(); el.select(); }
  }, 0);
}

function commitRename(mi) {
  const el = document.getElementById(`rename-${mi}`);
  const name = el ? el.value.trim() : '';
  if (name) modules[mi].name = name;
  editingModule = null;
  save();
  renderGrid();
}

function renameKeydown(e, mi) {
  if (e.key === 'Enter') commitRename(mi);
  if (e.key === 'Escape') { editingModule = null; renderGrid(); }
  e.stopPropagation();
}

function showAddItem(mi) {
  addingToModule = mi;
  renderGrid();
  setTimeout(() => {
    const el = document.getElementById(`new-item-${mi}`);
    if (el) el.focus();
  }, 0);
}

function cancelAddItem() {
  addingToModule = null;
  renderGrid();
}

function commitAddItem(mi) {
  const el = document.getElementById(`new-item-${mi}`);
  const name = el ? el.value.trim() : '';
  if (!name) { cancelAddItem(); return; }
  modules[mi].items.push({ n: name, s: 'todo' });
  addingToModule = null;
  save();
  render();
}

function addItemKeydown(e, mi) {
  if (e.key === 'Enter') commitAddItem(mi);
  if (e.key === 'Escape') cancelAddItem();
  e.stopPropagation();
}

function showAddModule() {
  addingToModule = -1;
  renderGrid();
  setTimeout(() => {
    const el = document.getElementById('new-module-input');
    if (el) el.focus();
  }, 0);
}

function cancelAddModule() {
  addingToModule = null;
  renderGrid();
}

function commitAddModule() {
  const el = document.getElementById('new-module-input');
  const name = el ? el.value.trim() : '';
  if (!name) { cancelAddModule(); return; }
  modules.push({ name, items: [] });
  addingToModule = null;
  save();
  render();
}

function addModuleKeydown(e) {
  if (e.key === 'Enter') commitAddModule();
  if (e.key === 'Escape') cancelAddModule();
  e.stopPropagation();
}

function exportData() {
  const json = JSON.stringify(modules, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = 'copiado!';
    setTimeout(() => btn.textContent = orig, 1800);
  }).catch(() => alert('Não foi possível copiar. Verifique as permissões do navegador.'));
}

function resetData() {
  if (!confirm('Resetar para os dados originais? Todas as alterações serão perdidas.')) return;
  localStorage.removeItem(STORAGE_KEY);
  modules = JSON.parse(JSON.stringify(DEFAULT_MODULES));
  editingModule = null;
  addingToModule = null;
  activeFilter = 'all';
  render();
}

/* ---- render stats ---- */
function renderStats() {
  const all   = allItems();
  const d     = all.filter(i => i.s === 'done').length;
  const r     = all.filter(i => i.s === 'rev').length;
  const t     = all.filter(i => i.s === 'todo').length;
  const n     = all.filter(i => i.s === 'nd').length;
  const total = all.length;
  const pct   = total ? Math.round(d / total * 100) : 0;

  document.getElementById('pct-global').textContent  = pct + '%';
  document.getElementById('subtitle').textContent    = `${total} itens em ${modules.length} módulos`;
  document.getElementById('footer').textContent      = `atualizado pelo painel · ${total} itens · ${modules.length} módulos`;

  const data = [
    { f: 'done', n: d,     label: 'Feito',       cls: 'c-done' },
    { f: 'rev',  n: r,     label: 'Revisar',     cls: 'c-rev'  },
    { f: 'todo', n: t,     label: 'Falta fazer', cls: 'c-todo' },
    { f: 'nd',   n: n,     label: 'N/D',         cls: 'c-nd'   },
    { f: 'all',  n: total, label: 'Total',       cls: 'c-pct'  },
  ];

  document.getElementById('stats').innerHTML = data.map(s => `
    <div class="stat${activeFilter === s.f ? ' active' : ''}" data-f="${s.f}" onclick="setFilter('${s.f}')">
      <div class="stat-n ${s.cls}">${s.n}</div>
      <div class="stat-l">${s.label}</div>
    </div>
  `).join('');
}

/* ---- render grid ---- */
function progClass(items) {
  if (items.every(i => i.s === 'nd')) return 'prog-nd';
  if (items.some(i => i.s === 'todo')) return 'prog-todo';
  if (items.some(i => i.s === 'rev'))  return 'prog-rev';
  return 'prog-done';
}

function renderGrid() {
  const visibleModules = activeFilter === 'all'
    ? modules.map((m, mi) => ({ ...m, mi }))
    : modules.map((m, mi) => ({ ...m, mi, items: m.items.filter(i => i.s === activeFilter) }))
             .filter(m => m.items.length > 0);

  const cards = visibleModules.map(m => {
    const mi    = m.mi;
    const allIt = modules[mi].items; // always use full items for progress
    const done  = allIt.filter(i => i.s === 'done').length;
    const total = allIt.length;
    const pct   = total ? Math.round(done / total * 100) : 0;
    const pc    = progClass(allIt);

    const nameHtml = editingModule === mi
      ? `<input id="rename-${mi}" class="card-name-input"
           value="${esc(m.name)}"
           onblur="commitRename(${mi})"
           onkeydown="renameKeydown(event, ${mi})"
           onclick="event.stopPropagation()">`
      : `<span class="card-name" title="Clique para renomear" onclick="startRename(${mi})">${esc(m.name)}</span>`;

    const itemsHtml = m.items.map((item, ii) => {
      // When filtered, find real index in original module
      const realIdx = activeFilter === 'all' ? ii : modules[mi].items.indexOf(item);
      return `
        <div class="item">
          <button class="item-del" onclick="deleteItem(${mi}, ${realIdx})" title="Remover">×</button>
          <span class="item-name">${esc(item.n)}</span>
          <span class="badge ${bcls[item.s]}" onclick="cycleStatus(${mi}, ${realIdx})" title="Clique para mudar status">${label[item.s]}</span>
        </div>`;
    }).join('');

    const addFormHtml = addingToModule === mi
      ? `<div class="add-item-row">
           <input id="new-item-${mi}" placeholder="Nome do item…" onkeydown="addItemKeydown(event, ${mi})">
           <button onclick="commitAddItem(${mi})">ok</button>
           <button class="cancel-btn" onclick="cancelAddItem()">×</button>
         </div>`
      : `<div class="add-item-link" onclick="showAddItem(${mi})">+ item</div>`;

    return `
      <div class="card">
        <div class="card-head">
          ${nameHtml}
          <div class="card-head-right">
            <span class="card-count">${done}/${total}</span>
            <button class="icon-btn" onclick="deleteModule(${mi})" title="Remover módulo">×</button>
          </div>
        </div>
        <div class="prog-track">
          <div class="prog-fill ${pc}" style="width:${pct}%"></div>
        </div>
        <div class="card-body">${itemsHtml}</div>
        ${addFormHtml}
      </div>`;
  }).join('');

  const addModuleCard = addingToModule === -1
    ? `<div class="card-add-module">
         <div class="add-module-row">
           <input id="new-module-input" placeholder="Nome do módulo…" onkeydown="addModuleKeydown(event)">
           <button onclick="commitAddModule()">ok</button>
         </div>
         <span style="cursor:pointer;color:var(--muted)" onclick="cancelAddModule()">cancelar</span>
       </div>`
    : `<div class="card-add-module" onclick="showAddModule()">
         <span>+ módulo</span>
       </div>`;

  document.getElementById('grid').innerHTML = cards + addModuleCard;
}

function render() {
  renderStats();
  renderGrid();
}

function setFilter(f) {
  activeFilter = f;
  render();
}

/* ---- init ---- */
modules = loadModules();
render();
</script>
</body>
</html>
