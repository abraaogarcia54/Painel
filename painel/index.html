<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Painel de Design - Figma</title>
<link rel="icon" type="image/svg+xml" href="https://infinitsolucoeswebdevelopment.com/images/infinit-blue-svg.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f0f;
    --bg2:      #161616;
    --bg3:      #1e1e1e;
    --border:   #2a2a2a;
    --border2:  #333;
    --text:     #e8e8e2;
    --muted:    #666;
    --muted2:   #444;
    --done:     #1D9E75;
    --done-bg:  #0a2e22;
    --done-txt: #5fcca0;
    --rev:      #d4860f;
    --rev-bg:   #2e1f05;
    --rev-txt:  #f5b44a;
    --todo:     #c0392b;
    --todo-bg:  #2e0e0a;
    --todo-txt: #f07060;
    --nd:       #555;
    --nd-bg:    #1a1a1a;
    --nd-txt:   #888;
    --accent:   #e8e8e2;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 32px 24px 64px;
  }

  header {
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header p {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 4px;
  }

  .global-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .global-bar .pct {
    font-size: 22px;
    font-weight: 500;
    color: var(--done);
    line-height: 1;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
    margin-bottom: 24px;
  }

  .stat {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }

  .stat:hover, .stat.active { border-color: var(--border2); background: var(--bg3); }

  .stat.active[data-f="done"]  { border-color: var(--done); }
  .stat.active[data-f="rev"]   { border-color: var(--rev); }
  .stat.active[data-f="todo"]  { border-color: var(--todo); }
  .stat.active[data-f="nd"]    { border-color: var(--nd); }

  .stat-n {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-n.c-done { color: var(--done); }
  .stat-n.c-rev  { color: var(--rev); }
  .stat-n.c-todo { color: var(--todo); }
  .stat-n.c-nd   { color: var(--nd); }
  .stat-n.c-pct  { color: var(--text); }

  .stat-l {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  /* ---- top bar (legend + actions) ---- */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
  }

  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .legend span { display: flex; align-items: center; gap: 5px; cursor: pointer; }
  .legend span:hover { color: var(--text); }

  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .d-done { background: var(--done); }
  .d-rev  { background: var(--rev); }
  .d-todo { background: var(--todo); }
  .d-nd   { background: var(--nd); }

  .actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .saved-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--done);
    opacity: 0;
    transition: opacity .3s;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .saved-tag.show { opacity: 1; }

  .btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 5px 11px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: .06em;
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--muted);
    transition: all .15s;
  }
  .btn:hover { background: var(--bg3); color: var(--text); }
  .btn-danger:hover { border-color: var(--todo); color: var(--todo-txt); background: var(--todo-bg); }

  /* ---- grid ---- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .card:hover { border-color: var(--border2); }
  .card.dragging { opacity: 0.35; border-style: dashed; }
  .card.drag-over { border-color: var(--done) !important; box-shadow: 0 0 0 1px var(--done); background: var(--done-bg); }

  .drag-handle {
    cursor: grab;
    color: var(--muted2);
    font-size: 14px;
    opacity: 0;
    transition: opacity .1s;
    flex-shrink: 0;
    user-select: none;
    padding: 0 2px;
    display: flex;
    align-items: center;
  }
  .card:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }

  .card-head {
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .card-name {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .03em;
    color: var(--text);
    text-transform: uppercase;
    cursor: pointer;
    flex: 1;
    min-width: 0;
  }
  .card-name:hover { color: var(--done-txt); }

  .card-name-input {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .03em;
    text-transform: uppercase;
    background: var(--bg3);
    border: 1px solid var(--done);
    border-radius: 3px;
    color: var(--text);
    padding: 2px 6px;
    outline: none;
    width: 100%;
    min-width: 0;
    flex: 1;
  }

  .card-head-right {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .card-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
  }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted2);
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
    opacity: 0;
    transition: opacity .1s, color .1s;
    display: flex;
    align-items: center;
  }
  .card:hover .icon-btn { opacity: 1; }
  .icon-btn:hover { color: var(--todo-txt); }

  .prog-track { height: 2px; background: var(--border); }
  .prog-fill  { height: 2px; transition: width .4s ease; }
  .prog-done  { background: var(--done); }
  .prog-rev   { background: var(--rev); }
  .prog-todo  { background: var(--todo); }
  .prog-nd    { background: var(--nd); }

  .card-body { padding: 6px 0 4px; }

  .item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 14px;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  .item:last-child { border-bottom: none; }
  .item:hover { background: var(--bg3); }

  .item-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted2);
    font-size: 13px;
    line-height: 1;
    padding: 0 2px;
    opacity: 0;
    transition: opacity .1s, color .1s;
    flex-shrink: 0;
  }
  .item:hover .item-del { opacity: 1; }
  .item-del:hover { color: var(--todo-txt); }

  .item-name {
    font-size: 12px;
    color: #aaa;
    flex: 1;
  }

  .badge {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .05em;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: filter .1s;
  }
  .badge:hover { filter: brightness(1.25); }

  .b-done { background: var(--done-bg); color: var(--done-txt); }
  .b-rev  { background: var(--rev-bg);  color: var(--rev-txt); }
  .b-todo { background: var(--todo-bg); color: var(--todo-txt); }
  .b-nd   { background: var(--nd-bg);   color: var(--nd-txt); }

  /* ---- add item form ---- */
  .add-item-row {
    display: flex;
    gap: 6px;
    padding: 7px 14px;
    border-top: 1px solid var(--border);
  }
  .add-item-row input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 4px 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    outline: none;
    min-width: 0;
  }
  .add-item-row input:focus { border-color: var(--done); }
  .add-item-row button {
    background: var(--done-bg);
    border: 1px solid var(--done);
    border-radius: 4px;
    color: var(--done-txt);
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 8px;
    cursor: pointer;
    white-space: nowrap;
  }
  .add-item-row button:hover { background: var(--done); color: #fff; }
  .add-item-row .cancel-btn {
    background: none;
    border-color: var(--border2);
    color: var(--muted);
  }
  .add-item-row .cancel-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }

  .add-item-link {
    display: block;
    padding: 7px 14px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted2);
    text-transform: uppercase;
    letter-spacing: .06em;
    cursor: pointer;
    border-top: 1px solid var(--border);
    transition: color .1s, background .1s;
    text-align: center;
  }
  .add-item-link:hover { color: var(--done-txt); background: var(--bg3); }

  /* ---- dashboard ---- */
.dashboard {
  display: flex;
  gap: 24px;
  align-items: flex-start;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 24px;
  margin-bottom: 24px;
}

.dash-donut {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.dash-legend {
  display: flex;
  flex-direction: column;
  gap: 5px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}

.dash-legend span { display: flex; align-items: center; gap: 6px; }

.dash-sparklines {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 0;
  justify-content: center;
}

.spark-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.spark-name {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .02em;
  width: 150px;
  flex-shrink: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.spark-svg {
  flex: 1;
  height: 20px;
  min-width: 60px;
}

.spark-delta {
  font-family: var(--mono);
  font-size: 10px;
  width: 48px;
  text-align: right;
  flex-shrink: 0;
}

.dash-no-history {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted2);
  font-style: italic;
}

  /* ---- add module card ---- */
  .card-add-module {
    background: none;
    border: 1px dashed var(--border2);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    padding: 16px;
    gap: 10px;
  }
  .card-add-module:hover { border-color: var(--done); background: var(--done-bg); }
  .card-add-module span {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .card-add-module:hover span { color: var(--done-txt); }

  .add-module-row {
    display: flex;
    gap: 6px;
    width: 100%;
  }
  .add-module-row input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--done);
    border-radius: 4px;
    padding: 6px 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .03em;
    outline: none;
    min-width: 0;
  }
  .add-module-row button {
    background: var(--done-bg);
    border: 1px solid var(--done);
    border-radius: 4px;
    color: var(--done-txt);
    font-family: var(--mono);
    font-size: 10px;
    padding: 6px 10px;
    cursor: pointer;
  }
  .add-module-row button:hover { background: var(--done); color: #fff; }

  footer {
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted2);
    text-align: center;
  }

  /* ---- login screen ---- */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 36px 32px 32px;
    width: 100%;
    max-width: 360px;
  }
  .login-title {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .login-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: 24px;
  }
  .login-field {
    margin-bottom: 14px;
  }
  .login-field label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .login-field input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 8px 11px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color .15s;
  }
  .login-field input:focus { border-color: var(--done); }
  .login-error {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--todo-txt);
    min-height: 16px;
    margin-bottom: 12px;
  }
  .login-btn {
    width: 100%;
    padding: 9px;
    font-size: 11px;
    background: var(--bg3);
    border-color: var(--done);
    color: var(--done-txt);
  }
  .login-btn:hover { background: var(--done-bg); }

  /* ---- user info in header ---- */
  .user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }
  .user-badge {
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .06em;
    border: 1px solid var(--border2);
  }
  .badge-admin  { color: var(--done-txt);  border-color: var(--done);  background: var(--done-bg); }
  .badge-editor { color: var(--rev-txt);   border-color: var(--rev);   background: var(--rev-bg);  }
  .badge-viewer { color: var(--nd-txt);    border-color: var(--nd);    background: var(--nd-bg);   }

  /* ---- admin users page ---- */
  .users-page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .users-page-header h2 {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
  }
  .users-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 24px;
    font-family: var(--mono);
    font-size: 11px;
  }
  .users-table th {
    text-align: left;
    padding: 8px 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    font-size: 9px;
    border-bottom: 1px solid var(--border);
  }
  .users-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .add-user-form {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: flex-end;
    padding: 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
  }
  .add-user-form input, .add-user-form select {
    flex: 1;
    min-width: 120px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 6px 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    outline: none;
  }
  .add-user-form input:focus, .add-user-form select:focus { border-color: var(--done); }
  .users-msg {
    font-family: var(--mono);
    font-size: 10px;
    min-height: 16px;
  }
  .users-msg.err  { color: var(--todo-txt); }
  .users-msg.ok   { color: var(--done-txt); }
</style>
</head>
<body>

<div id="login-screen" style="display:none">
  <div class="login-wrap">
    <div class="login-card">
      <h1 class="login-title">Painel de Design</h1>
      <p class="login-sub">faça login para continuar</p>
      <form id="login-form">
        <div class="login-field">
          <label>Email</label>
          <input type="email" id="login-email" autocomplete="email" required>
        </div>
        <div class="login-field">
          <label>Senha</label>
          <input type="password" id="login-password" autocomplete="current-password" required>
        </div>
        <p class="login-error" id="login-error"></p>
        <button type="submit" class="btn login-btn">Entrar</button>
      </form>
    </div>
  </div>
</div>

<div id="app-screen" style="display:none">

<div id="users-page" style="display:none"></div>

<div id="main-content">

<header>
  <div>
    <h1>Painel de Design - Figma</h1>
    <p id="subtitle">carregando...</p>
  </div>
  <div style="display:flex;align-items:center;gap:20px">
    <div class="global-bar">
      <div>
        <div class="pct" id="pct-global" style="font-size: 40px;">0%</div>
        <div style="font-size:10px;margin-top:2px">concluído</div>
      </div>
    </div>
    <div class="user-info" id="user-info"></div>
  </div>
</header>

<div class="stats" id="stats"></div>

<div class="top-bar">
  <div class="legend">
    <span onclick="setFilter('all')"><span class="dot" style="background:var(--muted)"></span>Todos</span>
    <span onclick="setFilter('done')"><span class="dot d-done"></span>Feito</span>
    <span onclick="setFilter('rev')"><span class="dot d-rev"></span>Revisar</span>
    <span onclick="setFilter('todo')"><span class="dot d-todo"></span>Falta fazer</span>
    <span onclick="setFilter('nd')"><span class="dot d-nd"></span>Não definido</span>
  </div>
  <div class="actions">
    <span class="saved-tag" id="saved">salvo ✓</span>
    <span id="action-buttons"></span>
  </div>
</div>

<div class="grid" id="grid"></div>

<footer id="footer"></footer>

<script>
const statusOrder = ['done', 'rev', 'todo', 'nd'];
const label = { done: "Feito", rev: "Revisar", todo: "Falta fazer", nd: "Não definido" };
const bcls  = { done: "b-done", rev: "b-rev", todo: "b-todo", nd: "b-nd" };

let modules = [];
let history = [];
let activeFilter   = "all";
let editingModule  = null; // index being renamed
let addingToModule = null; // index getting new item, or -1 for new module

/* ---- persistence ---- */
async function loadModules() {
  const res = await fetch('/api/modules');
  if (!res.ok) throw new Error('Falha ao carregar módulos');
  return res.json();
}

async function save() {
  try {
    const res = await fetch('/api/modules', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(modules)
    });
    if (!res.ok) throw new Error('Falha ao salvar');
    const el = document.getElementById('saved');
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 1800);
  } catch {
    const el = document.getElementById('saved');
    const orig = el.textContent;
    el.textContent = 'erro ao salvar';
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.textContent = orig; el.classList.remove('show'); }, 3000);
  }
}

/* ---- helpers ---- */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function allItems() {
  return modules.flatMap(m => m.items);
}

/* ---- mutations ---- */
function cycleStatus(mi, ii) {
  const item = modules[mi].items[ii];
  item.s = statusOrder[(statusOrder.indexOf(item.s) + 1) % statusOrder.length];
  save();
  render();
}

function deleteItem(mi, ii) {
  modules[mi].items.splice(ii, 1);
  save();
  render();
}

function deleteModule(mi) {
  if (!confirm(`Remover o módulo "${modules[mi].name}"?`)) return;
  modules.splice(mi, 1);
  if (editingModule === mi) editingModule = null;
  save();
  render();
}

function startRename(mi) {
  editingModule = mi;
  renderGrid();
  setTimeout(() => {
    const el = document.getElementById(`rename-${mi}`);
    if (el) { el.focus(); el.select(); }
  }, 0);
}

function commitRename(mi) {
  const el = document.getElementById(`rename-${mi}`);
  const name = el ? el.value.trim() : '';
  if (name) modules[mi].name = name;
  editingModule = null;
  save();
  renderGrid();
}

function renameKeydown(e, mi) {
  if (e.key === 'Enter') commitRename(mi);
  if (e.key === 'Escape') { editingModule = null; renderGrid(); }
  e.stopPropagation();
}

function showAddItem(mi) {
  addingToModule = mi;
  renderGrid();
  setTimeout(() => {
    const el = document.getElementById(`new-item-${mi}`);
    if (el) el.focus();
  }, 0);
}

function cancelAddItem() {
  addingToModule = null;
  renderGrid();
}

function commitAddItem(mi) {
  const el = document.getElementById(`new-item-${mi}`);
  const name = el ? el.value.trim() : '';
  if (!name) { cancelAddItem(); return; }
  modules[mi].items.push({ n: name, s: 'todo' });
  addingToModule = null;
  save();
  render();
}

function addItemKeydown(e, mi) {
  if (e.key === 'Enter') commitAddItem(mi);
  if (e.key === 'Escape') cancelAddItem();
  e.stopPropagation();
}

function showAddModule() {
  addingToModule = -1;
  renderGrid();
  setTimeout(() => {
    const el = document.getElementById('new-module-input');
    if (el) el.focus();
  }, 0);
}

function cancelAddModule() {
  addingToModule = null;
  renderGrid();
}

function commitAddModule() {
  const el = document.getElementById('new-module-input');
  const name = el ? el.value.trim() : '';
  if (!name) { cancelAddModule(); return; }
  modules.push({ name, items: [] });
  addingToModule = null;
  save();
  render();
}

function addModuleKeydown(e) {
  if (e.key === 'Enter') commitAddModule();
  if (e.key === 'Escape') cancelAddModule();
  e.stopPropagation();
}

function exportData(e) {
  const btn = e.target;
  const orig = btn.textContent;
  const json = JSON.stringify(modules, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    btn.textContent = 'copiado!';
    setTimeout(() => btn.textContent = orig, 1800);
  }).catch(() => alert('Não foi possível copiar. Verifique as permissões do navegador.'));
}

async function resetData() {
  if (!confirm('Resetar para os dados originais? Todas as alterações serão perdidas.')) return;
  const res = await fetch('/api/modules/reset', { method: 'POST' });
  if (!res.ok) { alert('Falha ao resetar.'); return; }
  modules = await res.json();
  editingModule = null;
  addingToModule = null;
  activeFilter = 'all';
  render();
}

/* ---- drag to reorder ---- */
let dragSrcMi = null;

function onDragStart(e, mi) {
  dragSrcMi = mi;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const card = document.querySelector(`[data-mi="${mi}"]`);
    if (card) card.classList.add('dragging');
  }, 0);
}

function onDragEnd() {
  dragSrcMi = null;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('dragging', 'drag-over'));
}

function onDragOver(e, mi) {
  if (dragSrcMi === null || dragSrcMi === mi) return;
  e.preventDefault();
  document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
  const card = document.querySelector(`[data-mi="${mi}"]`);
  if (card) card.classList.add('drag-over');
}

function onDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over');
  }
}

function onDrop(e, mi) {
  e.preventDefault();
  if (dragSrcMi === null || dragSrcMi === mi) return;
  const [moved] = modules.splice(dragSrcMi, 1);
  modules.splice(mi, 0, moved);
  dragSrcMi = null;
  save();
  render();
}

/* ---- render dashboard ---- */
function buildDonutSVG(d, r, t, total) {
  if (total === 0) {
    return '<svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="var(--bg3)" stroke-width="14"/><text x="50" y="50" text-anchor="middle" dominant-baseline="middle" font-family="var(--mono)" font-size="10" fill="var(--muted)">sem itens</text></svg>';
  }
  const C = 251.3;
  let offset = 0;
  function seg(len, color) {
    if (len <= 0) return '';
    const s = `<circle cx="50" cy="50" r="40" fill="none" stroke="${color}" stroke-width="14" stroke-dasharray="${len.toFixed(1)} ${C}" stroke-dashoffset="${(-offset).toFixed(1)}" transform="rotate(-90 50 50)"/>`;
    offset += len;
    return s;
  }
  const dLen = (d / total) * C;
  const rLen = (r / total) * C;
  const tLen = (t / total) * C;
  const pct  = Math.round(d / total * 100);
  return `<svg width="100" height="100" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="40" fill="none" stroke="var(--bg3)" stroke-width="14"/>
    ${seg(dLen, 'var(--done)')}${seg(rLen, 'var(--rev)')}${seg(tLen, 'var(--todo)')}
    <text x="50" y="46" text-anchor="middle" font-family="var(--mono)" font-size="14" font-weight="500" fill="var(--done-txt)">${pct}%</text>
    <text x="50" y="58" text-anchor="middle" font-family="var(--mono)" font-size="8" fill="var(--muted)">feito</text>
  </svg>`;
}

function buildSparklines() {
  if (history.length < 2) return '';
  const recent = history.slice(-7);
  const n = recent.length;
  return modules.map(mod => {
    const snapPcts = recent.map(snap => {
      const m = snap.modules.find(sm => sm.name === mod.name);
      return m && m.total > 0 ? (m.done / m.total) * 100 : 0;
    });
    const points = snapPcts.map((pct, i) => {
      const x = n > 1 ? (i / (n - 1)) * 80 : 40;
      const y = 18 - (pct / 100) * 16;
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    const delta = Math.round(snapPcts[snapPcts.length - 1] - snapPcts[0]);
    const deltaColor = delta > 0 ? 'var(--done-txt)' : delta < 0 ? 'var(--todo-txt)' : 'var(--muted)';
    const deltaStr   = delta > 0 ? `↑+${delta}%` : delta < 0 ? `↓${delta}%` : '→ 0%';
    return `<div class="spark-row">
      <span class="spark-name">${esc(mod.name)}</span>
      <svg class="spark-svg" viewBox="0 0 80 20" preserveAspectRatio="none">
        <polyline points="${points}" fill="none" stroke="var(--done)" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <span class="spark-delta" style="color:${deltaColor}">${deltaStr}</span>
    </div>`;
  }).join('');
}

function buildDashboardHTML(d, r, t, n, total) {
  const donutSVG = buildDonutSVG(d, r, t, total);
  const pctDone  = total ? Math.round(d / total * 100) : 0;
  const pctRev   = total ? Math.round(r / total * 100) : 0;
  const pctTodo  = total ? Math.round(t / total * 100) : 0;
  const sparklines = buildSparklines();
  const sparklinesSection = sparklines
    ? `<div class="dash-sparklines">${sparklines}</div>`
    : `<div class="dash-sparklines"><span class="dash-no-history">histórico disponível após o primeiro snapshot automático (meia-noite)</span></div>`;
  return `<div class="dashboard">
    <div class="dash-donut">
      ${donutSVG}
      <div class="dash-legend">
        <span><span class="dot d-done"></span>Feito ${pctDone}% (${d})</span>
        <span><span class="dot d-rev"></span>Revisar ${pctRev}% (${r})</span>
        <span><span class="dot d-todo"></span>Falta ${pctTodo}% (${t})</span>
        <span><span class="dot d-nd"></span>N/D ${n}</span>
      </div>
    </div>
    ${sparklinesSection}
  </div>`;
}

function renderDashboard() {
  const all   = allItems();
  const d     = all.filter(i => i.s === 'done').length;
  const r     = all.filter(i => i.s === 'rev').length;
  const t     = all.filter(i => i.s === 'todo').length;
  const n     = all.filter(i => i.s === 'nd').length;
  const total = all.length;
  const pct   = total ? Math.round(d / total * 100) : 0;

  document.getElementById('pct-global').textContent = pct + '%';
  document.getElementById('subtitle').textContent   = `${total} itens em ${modules.length} módulos`;
  document.getElementById('footer').textContent     = `atualizado pelo painel · ${total} itens · ${modules.length} módulos`;

  const btnEl = document.getElementById('action-buttons');
  if (btnEl && currentUser) {
    const exportBtn = currentUser.role !== 'viewer'
      ? `<button class="btn" onclick="exportData(event)">Exportar</button>`
      : '';
    const resetBtn = currentUser.role === 'admin'
      ? `<button class="btn btn-danger" onclick="resetData()">Reset</button>`
      : '';
    btnEl.innerHTML = exportBtn + resetBtn;
  }

  document.getElementById('stats').innerHTML = buildDashboardHTML(d, r, t, n, total);
}

/* ---- render grid ---- */
function progClass(items) {
  if (items.every(i => i.s === 'nd')) return 'prog-nd';
  if (items.some(i => i.s === 'todo')) return 'prog-todo';
  if (items.some(i => i.s === 'rev'))  return 'prog-rev';
  return 'prog-done';
}

function renderGrid() {
  const visibleModules = activeFilter === 'all'
    ? modules.map((m, mi) => ({ ...m, mi }))
    : modules.map((m, mi) => ({ ...m, mi, items: m.items.filter(i => i.s === activeFilter) }))
             .filter(m => m.items.length > 0);

  const cards = visibleModules.map(m => {
    const mi    = m.mi;
    const allIt = modules[mi].items; // always use full items for progress
    const done  = allIt.filter(i => i.s === 'done').length;
    const total = allIt.length;
    const pct   = total ? Math.round(done / total * 100) : 0;
    const pc    = progClass(allIt);
    const isViewer = currentUser && currentUser.role === 'viewer';

    const nameHtml = (!isViewer && editingModule === mi)
      ? `<input id="rename-${mi}" class="card-name-input"
           value="${esc(m.name)}"
           onblur="commitRename(${mi})"
           onkeydown="renameKeydown(event, ${mi})"
           onclick="event.stopPropagation()">`
      : isViewer
        ? `<span class="card-name">${esc(m.name)}</span>`
        : `<span class="card-name" title="Clique para renomear" onclick="startRename(${mi})">${esc(m.name)}</span>`;

    const itemsHtml = m.items.map((item, ii) => {
      // When filtered, find real index in original module
      const realIdx = activeFilter === 'all' ? ii : modules[mi].items.indexOf(item);
      return `
        <div class="item">
          ${!isViewer ? `<button class="item-del" onclick="deleteItem(${mi}, ${realIdx})" title="Remover">×</button>` : ''}
          <span class="item-name">${esc(item.n)}</span>
          <span class="badge ${bcls[item.s]}" ${!isViewer ? `onclick="cycleStatus(${mi}, ${realIdx})"` : ''} title="${!isViewer ? 'Clique para mudar status' : label[item.s]}">${label[item.s]}</span>
        </div>`;
    }).join('');

    const addFormHtml = isViewer ? '' : (addingToModule === mi
      ? `<div class="add-item-row">
           <input id="new-item-${mi}" placeholder="Nome do item…" onkeydown="addItemKeydown(event, ${mi})">
           <button onclick="commitAddItem(${mi})">ok</button>
           <button class="cancel-btn" onclick="cancelAddItem()">×</button>
         </div>`
      : `<div class="add-item-link" onclick="showAddItem(${mi})">+ item</div>`);

    const dragEnabled = activeFilter === 'all';
    const dragAttrs = dragEnabled
      ? `draggable="true" data-mi="${mi}"
         ondragstart="onDragStart(event,${mi})"
         ondragend="onDragEnd()"
         ondragover="onDragOver(event,${mi})"
         ondragleave="onDragLeave(event)"
         ondrop="onDrop(event,${mi})"`
      : '';
    const dragHandle = dragEnabled
      ? `<span class="drag-handle" title="Arrastar para reordenar">⠿</span>`
      : '';

    return `
      <div class="card" ${dragAttrs}>
        <div class="card-head">
          ${dragHandle}${nameHtml}
          <div class="card-head-right">
            <span class="card-count">${done}/${total}</span>
            ${!isViewer ? `<button class="icon-btn" onclick="deleteModule(${mi})" title="Remover módulo">×</button>` : ''}
          </div>
        </div>
        <div class="prog-track">
          <div class="prog-fill ${pc}" style="width:${pct}%"></div>
        </div>
        <div class="card-body">${itemsHtml}</div>
        ${addFormHtml}
      </div>`;
  }).join('');

  const isViewerGlobal = currentUser && currentUser.role === 'viewer';
  const addModuleCard = isViewerGlobal ? '' : (addingToModule === -1
    ? `<div class="card-add-module">
         <div class="add-module-row">
           <input id="new-module-input" placeholder="Nome do módulo…" onkeydown="addModuleKeydown(event)">
           <button onclick="commitAddModule()">ok</button>
         </div>
         <span style="cursor:pointer;color:var(--muted)" onclick="cancelAddModule()">cancelar</span>
       </div>`
    : `<div class="card-add-module" onclick="showAddModule()">
         <span>+ módulo</span>
       </div>`);

  document.getElementById('grid').innerHTML = cards + addModuleCard;
}

function render() {
  renderDashboard();
  renderGrid();
}

function setFilter(f) {
  activeFilter = f;
  render();
}

/* ---- state: current user ---- */
let currentUser = null;

/* ---- auth helpers ---- */
async function checkAuth() {
  try {
    const res = await fetch('/auth/me');
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

async function logout() {
  await fetch('/auth/logout', { method: 'POST' });
  currentUser = null;
  showLoginScreen();
}

function showLoginScreen() {
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'block';
}

function showAppScreen() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
}

function renderUserInfo() {
  const el = document.getElementById('user-info');
  if (!el || !currentUser) return;
  const badgeCls = `badge-${esc(currentUser.role)}`;
  const usersLink = currentUser.role === 'admin'
    ? `<span class="btn" style="cursor:pointer" onclick="showUsersPage()">Usuários</span>`
    : '';
  el.innerHTML = `
    <span>${esc(currentUser.name)}</span>
    <span class="user-badge ${badgeCls}">${esc(currentUser.role)}</span>
    ${usersLink}
    <button class="btn btn-danger" onclick="logout()">Sair</button>
  `;
}

/* ---- login form ---- */
document.getElementById('login-form').addEventListener('submit', async function (e) {
  e.preventDefault();
  const email    = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  errEl.textContent = '';

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      errEl.textContent = body.error || 'Credenciais inválidas';
      return;
    }
    currentUser = await res.json();
    [modules, history] = await Promise.all([
      loadModules(),
      fetch('/api/history').then(r => r.json()).catch(() => [])
    ]);
    renderUserInfo();
    showAppScreen();
    render();
  } catch {
    errEl.textContent = 'Erro de conexão. Tente novamente.';
  }
});

/* ---- admin users page ---- */
function showUsersPage() {
  document.getElementById('users-page').style.display = 'block';
  document.getElementById('main-content').style.display = 'none';
  renderUsersPage();
}

function showMainPage() {
  document.getElementById('users-page').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
}

async function renderUsersPage() {
  const container = document.getElementById('users-page');
  container.innerHTML = '<p style="font-family:var(--mono);color:var(--muted);padding:16px">carregando...</p>';

  let users;
  try {
    const res = await fetch('/api/users');
    if (!res.ok) throw new Error();
    users = await res.json();
  } catch {
    container.innerHTML = '<p style="color:var(--todo-txt);font-family:var(--mono);padding:16px">Erro ao carregar usuários.</p>';
    return;
  }

  container.innerHTML = `
    <div class="users-page-header">
      <h2>Gestão de Usuários</h2>
      <button class="btn" onclick="showMainPage()">← Voltar</button>
    </div>
    <table class="users-table">
      <thead><tr><th>Nome</th><th>Email</th><th>Role</th><th></th></tr></thead>
      <tbody>
        ${users.map(u => `
          <tr>
            <td>${esc(u.name)}</td>
            <td>${esc(u.email)}</td>
            <td><span class="user-badge badge-${esc(u.role)}">${esc(u.role)}</span></td>
            <td>${u.id !== currentUser.id
              ? `<button class="btn btn-danger" onclick="deleteUserById('${esc(u.id)}')">×</button>`
              : '<span style="color:var(--muted);font-size:10px;font-family:var(--mono)">(você)</span>'
            }</td>
          </tr>`).join('')}
      </tbody>
    </table>
    <div class="add-user-form">
      <input id="nu-name"     type="text"     placeholder="Nome">
      <input id="nu-email"    type="email"    placeholder="Email">
      <input id="nu-password" type="password" placeholder="Senha">
      <select id="nu-role">
        <option value="viewer">Viewer</option>
        <option value="editor">Editor</option>
        <option value="admin">Admin</option>
      </select>
      <button class="btn" onclick="createUser()">+ Usuário</button>
    </div>
    <p class="users-msg" id="users-msg"></p>
  `;
}

async function createUser() {
  const name     = document.getElementById('nu-name').value.trim();
  const email    = document.getElementById('nu-email').value.trim();
  const password = document.getElementById('nu-password').value;
  const role     = document.getElementById('nu-role').value;
  const msgEl    = document.getElementById('users-msg');
  msgEl.textContent = '';
  msgEl.className = 'users-msg';

  if (!name || !email || !password) {
    msgEl.textContent = 'Preencha nome, email e senha.';
    msgEl.className = 'users-msg err';
    return;
  }

  try {
    const res = await fetch('/api/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password, role })
    });
    const body = await res.json();
    if (!res.ok) {
      msgEl.textContent = body.error || 'Erro ao criar usuário.';
      msgEl.className = 'users-msg err';
      return;
    }
    renderUsersPage();
  } catch {
    msgEl.textContent = 'Erro de conexão.';
    msgEl.className = 'users-msg err';
  }
}

async function deleteUserById(id) {
  if (!confirm('Remover este usuário?')) return;
  try {
    const res = await fetch(`/api/users/${id}`, { method: 'DELETE' });
    if (!res.ok) { alert('Erro ao remover usuário.'); return; }
    renderUsersPage();
  } catch {
    alert('Erro de conexão.');
  }
}

/* ---- init ---- */
async function init() {
  currentUser = await checkAuth();
  if (!currentUser) {
    showLoginScreen();
    return;
  }
  try {
    [modules, history] = await Promise.all([
      loadModules(),
      fetch('/api/history').then(r => r.json()).catch(() => [])
    ]);
  } catch {
    showLoginScreen();
    return;
  }
  renderUserInfo();
  showAppScreen();
  render();
}

init();
</script>
